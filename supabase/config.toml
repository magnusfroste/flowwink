# ─────────────────────────────────────────────────────────────────────
# Internally-invoked functions (server-to-server with service role).
# verify_jwt=false avoids 401s when SERVICE_ROLE_KEY env doesn't match
# the project's JWT secret (common on multi-project / forked deployments).
# Auth is enforced inside each handler via custom API keys.
# ─────────────────────────────────────────────────────────────────────

[functions.agent-execute]
verify_jwt = false

