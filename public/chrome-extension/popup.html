<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Capture Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 16px;
    }

    .section {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #a1a1aa;
    }

    select, input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #27272a;
      border-radius: 6px;
      background: #18181b;
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }

    select:focus, input:focus {
      border-color: #3b82f6;
    }

    input::placeholder {
      color: #52525b;
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .preset-btn {
      padding: 8px;
      border: 1px solid #27272a;
      border-radius: 6px;
      background: #18181b;
      color: #e5e5e5;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .preset-btn:hover {
      background: #27272a;
      border-color: #3b82f6;
    }

    .preset-btn.active {
      background: #1e3a5f;
      border-color: #3b82f6;
      color: #60a5fa;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #3b82f6;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #2563eb;
    }

    button:disabled {
      background: #27272a;
      color: #52525b;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.success {
      background: #1a3a1a;
      color: #4ade80;
      border: 1px solid #22c55e;
    }

    .status.error {
      background: #3a1a1a;
      color: #f87171;
      border: 1px solid #ef4444;
    }

    .help-text {
      font-size: 11px;
      color: #52525b;
      margin-top: 4px;
      line-height: 1.4;
    }

    .divider {
      height: 1px;
      background: #27272a;
      margin: 16px 0;
    }

    .info-box {
      padding: 10px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      font-size: 11px;
      color: #a1a1aa;
      line-height: 1.5;
    }

    .info-box strong {
      color: #e5e5e5;
    }

    .shortcut {
      display: inline-block;
      padding: 2px 6px;
      background: #27272a;
      border-radius: 4px;
      font-family: monospace;
      font-size: 10px;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <h1>⚡ Signal Capture</h1>
  <p class="subtitle">Configure your AI-powered CMS connection</p>

  <div class="section">
    <label>Quick Setup</label>
    <div class="preset-buttons">
      <button type="button" class="preset-btn" data-preset="flowwink">FlowWink</button>
      <button type="button" class="preset-btn" data-preset="mycms">MyCMS</button>
    </div>
  </div>

  <div class="section">
    <label for="project-name">Project Name</label>
    <input type="text" id="project-name" placeholder="FlowWink" />
  </div>

  <div class="section">
    <label for="endpoint">Signal Ingest Endpoint</label>
    <input type="url" id="endpoint" placeholder="https://your-project.supabase.co/functions/v1/signal-ingest" />
    <p class="help-text">Get this from your admin panel → Settings → API</p>
  </div>

  <div class="section">
    <label for="token">Signal Ingest Token</label>
    <input type="password" id="token" placeholder="Enter your token" />
    <p class="help-text">Found in admin panel → Settings → API Tokens</p>
  </div>

  <button id="save-btn">Save Settings</button>

  <div class="status" id="status"></div>

  <div class="divider"></div>

  <div class="info-box">
    <strong>Usage:</strong><br>
    • Press <span class="shortcut">⌘⇧S</span> (Mac) or <span class="shortcut">Ctrl⇧S</span> (Win) on any page<br>
    • Click the ⚡ button in bottom-right corner<br>
    • Select text to capture specific content
  </div>

  <script src="popup.js"></script>
</body>
</html>
