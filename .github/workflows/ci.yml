name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Skip entire workflow for Lovable bot pushes — they sync frequently and
# would otherwise spam notifications on every save. Manual pushes and PRs
# still run CI as normal.
run-name: CI${{ (github.actor == 'lovable-dev[bot]' || github.actor == 'lovable[bot]') && ' (skipped — bot push)' || '' }}

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: github.actor != 'lovable-dev[bot]' && github.actor != 'lovable[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so the migration forward-dating guard can compute the
          # merge-base with origin/main.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run tests
        run: npx vitest run

      - name: MCP module registry guard (static)
        run: npm run verify:hr-modules
        continue-on-error: true

      - name: Doc drift (modules → docs/modules/<id>.md)
        run: npx -y bun run scripts/check-doc-drift.ts --warn
        continue-on-error: true

      - name: Skill linter (Agent Contract Integrity — BLOCKING)
        run: npx -y bun run scripts/skill-linter.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Stage-2 gate of the parity pipeline (docs/parity/pipeline.md):
      # the generated parity matrix must match capabilities/*.json — no
      # hand-edited or stale scores. Pure-fs script, no deps, safe to block on.
      - name: Parity matrix freshness (Stage 2 gate — BLOCKING)
        run: npx -y bun run scripts/parity-report.ts --check

      # Root cause of the mid-2026 function-drift class: a migration whose
      # timestamp is below the ledger HEAD is SILENTLY SKIPPED on any instance
      # already past it, shipping stale bodies. This gate rejects any new
      # migration that is not forward-dated relative to the merge-base with main,
      # making the back-dated-skip impossible by construction.
      - name: Migration forward-dating guard (BLOCKING)
        run: git fetch origin main --quiet || true; npx -y bun run scripts/check-migration-forward-dated.ts

      # MCP live regression runs in dedicated workflow (.github/workflows/mcp-regression.yml)
      # — triggered on module changes + daily cron. Kept out of PR CI to avoid
      # gating PRs on live edge-function availability.

      - name: Timesheet → Invoice regression
        run: npm run test:timesheet-regression
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          MCP_ADMIN_JWT: ${{ secrets.MCP_ADMIN_JWT }}
          MCP_PROJECT_ID: ${{ secrets.MCP_PROJECT_ID }}
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    if: github.actor != 'lovable-dev[bot]' && github.actor != 'lovable[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: placeholder-for-ci
