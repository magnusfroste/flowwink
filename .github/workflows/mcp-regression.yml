name: MCP Regression (Live)

# Schemalagt MCP-regressionsjobb:
#   1. Triggas vid varje modul-släpp (push på src/lib/modules/** eller mcp-server)
#   2. Triggas dagligen via cron (06:00 UTC) som "drift detector"
#   3. Manuellt via workflow_dispatch
#
# Kör live JSON-RPC handshake (initialize) + tools/list-diff mot deployad
# MCP-edge function. Vid drift → fail + öppna GitHub Issue.

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/modules/**'
      - 'src/lib/module-registry.ts'
      - 'src/lib/module-bootstrap.ts'
      - 'supabase/functions/mcp-server/**'
      - 'scripts/mcp-regression.ts'
      - 'scripts/verify-hr-modules.ts'
  schedule:
    # Daglig drift-check kl 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  mcp-live-regression:
    name: Live MCP handshake + tools/list diff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skippa bot-pushar (Lovable agent committar ofta moduländringar — inte värt en live-check varje gång)
    if: github.actor != 'lovable-dev[bot]' && github.actor != 'lovable[bot]'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check MCP_API_KEY presence
        id: secret_check
        run: |
          if [ -z "${{ secrets.MCP_API_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::MCP_API_KEY saknas — hoppar över live-regression."
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.secret_check.outputs.has_key == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.secret_check.outputs.has_key == 'true'
        run: npm ci

      - name: Run MCP regression (handshake + tools/list)
        id: regression
        if: steps.secret_check.outputs.has_key == 'true'
        run: npm run test:mcp-regression
        env:
          MCP_API_KEY: ${{ secrets.MCP_API_KEY }}

      - name: Open GitHub Issue on regression
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 MCP regression detected (${new Date().toISOString().slice(0,10)})`;
            const body = [
              `The scheduled MCP live regression job failed.`,
              ``,
              `**Trigger:** \`${context.eventName}\``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ``,
              `One or more expected MCP tools are missing from the live server, or the JSON-RPC handshake failed.`,
              ``,
              `Likely causes:`,
              `- A module skill was removed without updating \`EXPECTED_TOOLS\` in \`scripts/mcp-regression.ts\``,
              `- \`mcp_exposed=false\` was set on a load-bearing skill`,
              `- The MCP edge function failed to deploy`,
              `- \`MCP_API_KEY\` rotated and CI secret is stale`,
            ].join('\n');

            // Avoid duplicate issues — search for an open one with same title prefix
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'mcp-regression',
            });
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: `Another regression run failed — see ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['mcp-regression', 'bug'],
              });
            }
