<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Apply theme before first paint to prevent FOUC / light-flash on refresh.
         Mirrors next-themes config in App.tsx: attribute="class", defaultTheme="system",
         enableSystem, storageKey="theme". Must stay in sync with that ThemeProvider. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored || 'system';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>

    <!-- BRANDLESS defaults only. Real per-site values are injected by:
         · react-helmet-async (SeoHead.tsx) for JS clients (title, OG, canonical, JSON-LD)
         · the crawler-prerender middleware (middleware.ts) for social/search bots
         Never hardcode a brand here — a self-hosted instance must advertise the
         CUSTOMER's identity and domain, not FlowWink's. -->
    <title>Website</title>
    <meta name="description" content="" />

    <!-- Google Fonts: Plus Jakarta Sans + Playfair Display for Design System 2026 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">

    <!-- Structural OG/Twitter only — title/description/image/url are set per-site
         by the crawler middleware (bots) and react-helmet (clients). -->
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
