<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Apply theme before first paint to prevent FOUC / light-flash on refresh.
         Mirrors next-themes config in App.tsx: attribute="class", defaultTheme="system",
         enableSystem, storageKey="theme". Must stay in sync with that ThemeProvider. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored || 'system';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          var root = document.documentElement;
          root.classList.remove('light', 'dark');
          root.classList.add(theme);
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>

    <!-- Default meta tags - will be overridden by React Helmet and SSR for social crawlers -->
    <title>FlowWink — The Business Operating System</title>
    <meta name="description" content="FlowWink is the first autonomous Business Operating System — self-hosted, open source, AI-native from line one. 200+ MCP skills across CRM, finance, ERP, and content." />
    
    <!-- Google Fonts: Plus Jakarta Sans + Playfair Display for Design System 2026 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">

    <!-- Open Graph defaults - overridden by CMS settings via SSR -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FlowWink — The Business Operating System">
    <meta property="og:description" content="FlowWink is the first autonomous Business Operating System — self-hosted, open source, AI-native from line one." />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlowWink — The Business Operating System">
    <meta name="twitter:description" content="FlowWink is the first autonomous Business Operating System — self-hosted, open source, AI-native from line one." />
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
